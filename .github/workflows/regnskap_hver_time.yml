name: Regnskap og Konkurs-Sjekk

on:
  schedule:
    - cron: '0 * * * *'  # Kjører hver hele time
  workflow_dispatch:     # Tillater manuell start

jobs:
  sjekk-regnskap:
    runs-on: ubuntu-latest

    steps:
    - name: Henter kode
      uses: actions/checkout@v4

    - name: Setter opp Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installerer pakker
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv

    - name: Kjører regnskapssjekk
      env:
        SLACK_BRREG: ${{ secrets.SLACK_BRREG }}
      run: python regnskap_varsel.py

    - name: Lagrer oppdatert tilstand (State) tilbake til GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # Sjekk om state-filen er opprettet eller endret før vi committer
        if [ -f brreg_state.json ]; then
          git add brreg_state.json
          git commit -m "Oppdaterer Brreg-state med varslede bedrifter [skip ci]" || echo "Ingen nye endringer å lagre"
          git push origin main
        fi
